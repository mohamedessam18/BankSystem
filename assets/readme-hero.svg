<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0E2A47"/>
      <stop offset="1" stop-color="#0A7B83"/>
    </linearGradient>
    <linearGradient id="card" x1="120" y1="70" x2="1080" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="90" x2="920" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63E6FF"/>
      <stop offset="0.5" stop-color="#79F2C0"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g filter="url(#blur)" opacity="0.45">
    <circle cx="205" cy="62" r="90" fill="#63E6FF"/>
    <circle cx="1000" cy="90" r="120" fill="#18C29C"/>
    <circle cx="877" cy="266" r="85" fill="#FFD166"/>
  </g>

  <rect x="72" y="48" width="1056" height="224" rx="26" fill="url(#card)" stroke="rgba(255,255,255,0.22)"/>

  <text x="115" y="118" fill="#CFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="6">BANKING PLATFORM SHOWCASE</text>
  <text x="115" y="172" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">Fintech Bank System</text>
  <text x="115" y="212" fill="#D9EEFF" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    Modern web dashboards, C++ business logic, REST services,
  </text>
  <text x="115" y="244" fill="#D9EEFF" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    and an upgraded desktop console experience in one project.
  </text>

  <rect x="825" y="93" width="215" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="855" y="124" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">React Frontend</text>

  <rect x="857" y="151" width="183" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="886" y="182" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">C++ Backend</text>

  <rect x="784" y="209" width="256" height="48" rx="24" fill="url(#accent)"/>
  <text x="818" y="240" fill="#04263A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Desktop + Web App</text>
</svg>
